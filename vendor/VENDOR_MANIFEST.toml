note             = "Vendor-only files subscription_gate.py + test_vendor_import.sh (vendor-side grafts). ical-server.py local additions captured in patch. Pin bumped 5b93782 -> c6939f8 for the #51 POST /api/v1/memory/assert graft (learning-loop L1 write). c6939f8 is the #51 commit on CM041 branch feat/user-asserted-facts-v1.0.1 (origin/feat/user-asserted-facts-v1.0.1) -- the assert code is byte-identical to origin/main's 4931c53/#51; it deliberately excludes the unrelated #44 api_timeline rework, which is NOT in scope for this graft. Pinning to this SHA (the source repo HEAD the freshness gate measures against) keeps the gate fail-closed AND green for the grafted content. 2026-06-18: added the GET /api/v1/conversation/{id}/speakers graft (CM048 speaker-identity round-route: api_conversation_speakers + _safe_conversation_dir + /speakers do_GET dispatch + listing). The same route is being landed in canonical CM041 (NO-MERGE branch speaker-id/cm041-speakers-endpoint-v1.0.1); until that merges and the pin re-bumps, the route lives as a vendor-side divergence captured in this patch (regenerated via scripts/_vendor_lib.sh vlib_shared_diff against c6939f8). test_vendor_import.sh Part 9 asserts the handler + dispatch are present so a re-vendor cannot silently drop it. 2026-06-26 (v1.0.4): added the GET /api/v1/reply-debt route (CM041 PR #76, commit 6c71030: REPLY_DEBT_PROJECT_DIR + _reply_debt_service cache + _load_reply_debt_service + api_reply_debt + the /api/v1/reply-debt do_GET dispatch + docstring/startup lines) as a VENDOR-FORWARD graft ahead of pin c6939f8. Pin deliberately NOT bumped to 584f3dfa: that bump would drag 22 unrelated upstream commits (+2008 lines: #588 contacts-diff, #44 timeline, NO-MERGE moat endpoints, #680 health, /preferences, etc.) -- deferred to the pre-F&F full re-vendor. Co-grafted the _safe_float helper verbatim from 584f3dfa (introduced upstream by 8459a57's /preferences route, a mirror of the already-present _safe_int; #76's dispatch calls it for threshold_hours) -- the ONLY extra dependency #76 needed; all other referenced names resolve (AST-verified, no NameError). The detector seam is runtime-only: _load_reply_debt_service lazily importlib.import_module('src.reply_debt_service') from REPLY_DEBT_PROJECT_DIR/OSTLER_PROJECT_DIR with graceful degrade (degraded:true, HTTP 200, never 5xx) -- no module-load dependency on CM048; resolves against the vendored cm048_pipeline (carries reply_debt_service + compute_reply_debts/reply_debt_payload + the G5 reply_debt_store_adapter). Live consumer: the v0.4.23 daemon's T1 reply-debt headline wiring (D14). In-place integrity holds (source@c6939f8 + this patch reproduces the vendor); freshness check-4 'source advanced past pin' is EXPECTED-RED per D12 (deferred full re-vendor)."

