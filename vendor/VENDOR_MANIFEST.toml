# VENDOR_MANIFEST.toml -- the source of truth for vendor freshness.
# ================================================================
#
# The Ostler DMG ships VENDORED copies of upstream source trees. A bug fixed
# in a source repo does NOT reach the customer until it is grafted into the
# matching vendor/ tree. This manifest pins, per vendored tree, exactly which
# source commit the vendor was last grafted from, plus a checked-in patch
# capturing the legitimate vendor-side divergence (en-dash house style, extra
# imports, vendor-only files). scripts/verify_vendor_fresh.sh enforces it;
# scripts/sync_vendor.sh updates it.
#
# Schema (flat, no nested tables -- a tiny dependency-free reader parses it):
#   [[tree]]
#   name            = "cm041/contact_syncer"   # logical id + path under vendor/divergences
#   vendor_path     = "vendor/cm041/contact_syncer"
#   source_repo     = "$CM041"  or an absolute path  (env placeholders expand)
#   source_path     = "contact_syncer"          # subpath within the source repo ("." = root)
#   pinned_sha      = "<full sha>"  |  "WORKING_TREE" (non-git source, e.g. CM019)
#   divergence_patch= "vendor/divergences/<id>.patch"   # "" if byte-identical
#   exclude         = ["tests/", "__pycache__/"]        # source paths NOT vendored
#   verify          = "full" | "skip"           # "skip" => WARN, never silently pass
#   note            = "free text"
#
# Source repo paths are overridable for operators/CI:
#   - per tree:  VENDOR_SRC_CM041_CONTACT_SYNCER=/path
#   - per base:  export CM041=/path  (the $CM041 placeholder below expands)
#
# Pinned SHAs captured 2026-06-16 from the local source checkouts:
#   CM041  5b93782   CM048  659d6639   CM021  0d73344f
#   CM024  43d6c5da   HR015  1bb0a0db   CM019  (not a git repo)
# v1.0.0 cut re-pin (2026-06-16): CM041 8b3135cc -> 5b93782 (post-merge head of
#   #46 people_list/reconverge + #47 displayName + #48 junk-data + #49 observed_at);
#   ostler_fda 1bb0a0db -> a15d82f (post-merge head of #191 FDA createdAt). The other
#   HR015 trees stay at 1bb0a0db (their source paths are unchanged across that range).

