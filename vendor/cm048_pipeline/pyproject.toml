[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cm048"
version = "0.1.0"
description = "PWG Conversation Processing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27,<1.0",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-mock"]

[project.scripts]
pwg-convo = "src.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
