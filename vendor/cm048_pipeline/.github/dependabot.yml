version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
