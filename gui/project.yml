name: OstlerInstaller
options:
  bundleIdPrefix: ai.ostler
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: V95N2B8X7A
    CODE_SIGN_STYLE: Manual
    PRODUCT_BUNDLE_IDENTIFIER: ai.ostler.installer
    PRODUCT_NAME: OstlerInstaller
    CURRENT_PROJECT_VERSION: "7"
    MARKETING_VERSION: "1.0.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  OstlerInstaller:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OstlerInstaller
        excludes:
          - "Resources/Illustrations/*"
    resources:
      - path: OstlerInstaller/Resources
        excludes:
          - "Fonts/**"
      - path: OstlerInstaller/Resources/Fonts
        type: folder
    info:
      path: OstlerInstaller/Info.plist
      properties:
        CFBundleName: OstlerInstaller
        CFBundleDisplayName: Ostler Installer
        CFBundleIdentifier: ai.ostler.installer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "7"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.utilities
        NSAppleEventsUsageDescription: "Ostler needs to ask for your administrator password to install Hub services."
        NSCalendarsFullAccessUsageDescription: "Ostler reads your calendar so the Hub can surface what is on next, prepare meeting briefs, and link people to events on the wiki. Events never leave this Mac."
        NSContactsUsageDescription: "Ostler reads your contacts to pre-fill names and addresses during install, and to recognise who you talk to most. Contacts never leave this Mac."
        NSDesktopFolderUsageDescription: "Ostler scans your Desktop for social-platform data exports during install. Files stay on this Mac."
        NSDownloadsFolderUsageDescription: "Ostler scans your Downloads folder for social-platform data exports during install. Files stay on this Mac."
        NSDocumentsFolderUsageDescription: "Ostler stores your knowledge graph under Documents/Ostler so it appears alongside your other documents. Files stay on this Mac."
        NSPhotoLibraryUsageDescription: "Ostler reads photo metadata (date, location, captions) so the Hub can tie memories to people, places, and events on the wiki. Photos themselves stay on this Mac."
        NSRemindersFullAccessUsageDescription: "Ostler reads and writes reminders so the Hub can push to-dos from emails, meetings, and chats into Apple Reminders. Reminders stay on this Mac and your iCloud account."
        ATSApplicationFontsPath: Fonts
    entitlements:
      path: OstlerInstaller/OstlerInstaller.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-unsigned-executable-memory: false
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.cs.allow-jit: false
        com.apple.security.cs.allow-dyld-environment-variables: true
        com.apple.security.automation.apple-events: true
        # CX-46 (DMG ship, 2026-05-24). Personal-information
        # entitlements for the four TCC pre-warm prompts. Without
        # these on a Developer-ID-signed hardened-runtime app,
        # macOS silently denies the requestAccess call without
        # rendering the prompt. Pair with Info.plist NS*UsageDescription.
        com.apple.security.personal-information.addressbook: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.personal-information.photos-library: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ostler.installer
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        ARCHS: "$(ARCHS_STANDARD)"
    postBuildScripts:
      - name: Organise brand fonts into Fonts/ subdir for ATSApplicationFontsPath
        script: |
          set -euo pipefail
          # Info.plist sets ATSApplicationFontsPath = "Fonts", which tells
          # macOS to look at Contents/Resources/Fonts/ for app-specific fonts
          # to register at launch. xcodegen's default group-based resources
          # copy flattens the source Fonts/ subdir, so without this step the
          # TTFs land flat at Contents/Resources/*.ttf and macOS never finds
          # them. Every Font.custom(...) call then silently falls back to
          # system. Caught by TNM 2026-05-16 review of PR #77 (Check 6).
          # Fix: post-build, ensure Fonts/ subdir exists and move any flat
          # brand TTFs (Outfit, IBMPlexSans, JetBrainsMono) + OFL.txt into it.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}/Fonts"
          for f in Outfit-Regular.ttf Outfit-Medium.ttf Outfit-SemiBold.ttf Outfit-Bold.ttf \
                   IBMPlexSans-Regular.ttf IBMPlexSans-Medium.ttf IBMPlexSans-SemiBold.ttf \
                   JetBrainsMono-Regular.ttf JetBrainsMono-Medium.ttf \
                   OFL.txt; do
              if [ -f "${DEST}/${f}" ]; then
                  mv -f "${DEST}/${f}" "${DEST}/Fonts/${f}"
              fi
          done
      - name: Bundle python-build-standalone Python 3.11 into Resources
        script: |
          set -euo pipefail
          # CX-19 (launch blocker, 2026-05-23). Studio retest #14 against
          # DMG #16 caught a phase-ordering bug that lands on every fresh
          # customer Mac: install.sh runs `python3 --version` early in
          # the QUESTIONS phase; on a stock macOS 15 install that hits
          # the /usr/bin/python3 Apple stub which fires the "Install
          # Command Line Tools" GUI dialog and returns non-zero. The
          # subsequent `brew install python@3.11` fallback also fails
          # because Homebrew has not been installed yet.
          #
          # Fix: bundle a portable Python 3.11 inside the .app via
          # python-build-standalone (the same upstream uv / ruff / mise /
          # Posit consume). install.sh prefers the bundled binary at
          # ${SCRIPT_DIR}/python/bin/python3.11 over any system python3,
          # so the customer install never depends on CLT or Homebrew
          # being present for the venv work.
          #
          # The Makefile target `download-python` (in gui/Makefile)
          # downloads + SHA-256-verifies the tarball into
          # ${BUILD_DIR}/python-bundle.tar.gz before xcodebuild runs.
          # If you are invoking xcodebuild by hand (rare), run
          # `make -C gui download-python` first.
          #
          # Apple Silicon only for v1.0 (the aarch64-apple-darwin
          # install_only flavor). Intel Mac support deferred to v1.0.1.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          # The Makefile drops the tarball at ${BUILD_DIR}/python-bundle.tar.gz.
          # When `make ship` is the entry point, BUILD_DIR defaults to
          # /tmp/ostler-installer-build-${USER}. When xcodebuild runs from
          # Xcode.app directly, fall back to a sibling-of-SRCROOT build/ dir.
          PYTHON_TARBALL=""
          for candidate in \
              "/tmp/ostler-installer-build-${USER}/python-bundle.tar.gz" \
              "${SRCROOT}/../build/python-bundle.tar.gz" \
              "${SRCROOT}/build/python-bundle.tar.gz"; do
              if [ -f "$candidate" ]; then
                  PYTHON_TARBALL="$candidate"
                  break
              fi
          done
          if [ -z "$PYTHON_TARBALL" ]; then
              echo "ERROR: python-build-standalone tarball missing." >&2
              echo "       Run 'make -C gui download-python' before building." >&2
              echo "       Searched:" >&2
              echo "         /tmp/ostler-installer-build-${USER}/python-bundle.tar.gz" >&2
              echo "         ${SRCROOT}/../build/python-bundle.tar.gz" >&2
              echo "         ${SRCROOT}/build/python-bundle.tar.gz" >&2
              exit 1
          fi
          echo "Bundling python-build-standalone from ${PYTHON_TARBALL} into Resources/python/"
          # Wipe any prior extraction so re-runs are idempotent and we never
          # ship a hybrid tree from two different upstream releases.
          rm -rf "${DEST}/python"
          mkdir -p "${DEST}/python"
          # --strip-components=1 drops the upstream "python/" wrapper dir.
          tar -xzf "$PYTHON_TARBALL" -C "${DEST}/python" --strip-components=1
          # Strip __pycache__ from the standard library before codesign.
          # python-build-standalone ships pre-compiled .pyc files; they are
          # not signable, and codesign --deep refuses to traverse them when
          # the parent dir lands as a "code resource". CPython regenerates
          # them lazily at first import. Mirror of the cm024_knowledge /
          # cm048_pipeline patterns below.
          find "${DEST}/python" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "${DEST}/python" -type f -name "*.pyc" -delete 2>/dev/null || true
          # Verify the binary landed at the expected path. install.sh
          # specifically tests `[[ -x ${SCRIPT_DIR}/python/bin/python3.11 ]]`
          # so a layout drift in upstream would silently degrade us back
          # to the system-python path (which is the failure shape we are
          # paying down). Refuse to ship a misshapen bundle.
          if [ ! -x "${DEST}/python/bin/python3.11" ]; then
              echo "ERROR: python3.11 binary not found at" >&2
              echo "       ${DEST}/python/bin/python3.11 after extraction." >&2
              echo "       Upstream tarball layout may have changed." >&2
              exit 1
          fi
          # Belt-and-braces xattr strip on the destination.
          /usr/bin/xattr -cr "${DEST}/python" || true
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/python/bin/python3.11
      - name: Bundle install.sh + lib/progress_emitter.sh + strings catalogue into Resources
        script: |
          set -euo pipefail
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}/lib"
          # Copy WITHOUT -p so we don't preserve source xattrs
          # (com.apple.provenance / com.apple.macl on Sonoma+ break codesign).
          #
          # progress_emitter.sh MUST land at ${DEST}/lib/progress_emitter.sh
          # (NOT ${DEST}/progress_emitter.sh). install.sh's source
          # resolution looks at "${SCRIPT_DIR}/lib/progress_emitter.sh"
          # first -- when install.sh runs from inside the .app,
          # SCRIPT_DIR is Contents/Resources so the lib/ subfolder is
          # mandatory. Pre-2026-05-13 this was bundled flat at
          # ${DEST}/progress_emitter.sh which caused the chicken-and-egg
          # fallback hang Andy hit on Mac Studio. Fix tracked in
          # HR015/launch/TNM_BRIEF_INSTALL_SH_PROGRESS_EMITTER_BOOTSTRAP_2026-05-13.md.
          #
          # install.sh.strings.en-GB.sh is the Rule 0.9 i18n catalogue.
          # install.sh sources it via ${SCRIPT_DIR}/install.sh.strings.${OSTLER_LANG}.sh
          # with en-GB fallback (install.sh:510-523), and hard-exits if missing.
          # Must be bundled flat alongside install.sh in Resources.
          cp "${SRCROOT}/../install.sh"                          "${DEST}/install.sh"
          cp "${SRCROOT}/../lib/progress_emitter.sh"             "${DEST}/lib/progress_emitter.sh"
          # CX-34 (2026-05-24, Studio retest #21): write_pipeline_signals.py is
          # invoked by install.sh:6220 (Mail content probe) to write
          # ~/.ostler/state/pipeline_signals.json. Pre-CX-34 it was missing from
          # the bundle, so install.sh fell through to the warn-only "could not
          # write pipeline_signals.json" branch -- which means Doctor's empty-
          # Mail diagnostic loses its sidecar and the install path silently
          # degrades. Bundle it alongside progress_emitter.sh.
          cp "${SRCROOT}/../lib/write_pipeline_signals.py"       "${DEST}/lib/write_pipeline_signals.py"
          cp "${SRCROOT}/../install.sh.strings.en-GB.sh"         "${DEST}/install.sh.strings.en-GB.sh"
          chmod 755 "${DEST}/install.sh" "${DEST}/lib/progress_emitter.sh"
          chmod 644 "${DEST}/install.sh.strings.en-GB.sh" "${DEST}/lib/write_pipeline_signals.py"
          # Ostler.app (Tauri Hub desktop) bundled inside OstlerInstaller.app
          # so the customer DMG ships a clean single-app layout (just the
          # installer + drag-to-Applications) yet install.sh's source-
          # preference path 2 (${SCRIPT_DIR}/Ostler.app) finds the bundle
          # at runtime when install.sh runs from inside Contents/Resources.
          # OSTLER_APP_PATH is exported by gui/Makefile's release target
          # before invoking xcodebuild; if absent or missing the build
          # logs a warning and the customer install will skip the Hub-app
          # step (install.sh's existing source-not-found warning).
          if [ -n "${OSTLER_APP_PATH:-}" ] && [ -d "${OSTLER_APP_PATH}" ]; then
            echo "Bundling Ostler.app from ${OSTLER_APP_PATH} into Resources/"
            cp -R "${OSTLER_APP_PATH}" "${DEST}/Ostler.app"
            /usr/bin/xattr -cr "${DEST}/Ostler.app" || true
          else
            echo "WARNING: OSTLER_APP_PATH not set or missing; OstlerInstaller will ship without bundled Ostler.app." >&2
          fi
        inputFiles:
          - $(SRCROOT)/../install.sh
          - $(SRCROOT)/../lib/progress_emitter.sh
          - $(SRCROOT)/../lib/write_pipeline_signals.py
          - $(SRCROOT)/../install.sh.strings.en-GB.sh
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/install.sh
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/lib/progress_emitter.sh
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/lib/write_pipeline_signals.py
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/install.sh.strings.en-GB.sh
      - name: Bundle ostler_security Python package into Resources
        script: |
          set -euo pipefail
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/ostler_security"
          if [ -d "${SRC}" ]; then
            echo "Bundling ostler_security from ${SRC} into Resources/"
            mkdir -p "${DEST}/ostler_security"
            cp -R "${SRC}/" "${DEST}/ostler_security/"
            /usr/bin/xattr -cr "${DEST}/ostler_security" || true
          else
            echo "ERROR: vendor/ostler_security not found at ${SRC}" >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/ostler_security
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ostler_security
      - name: Bundle ostler_fda Python package into Resources
        script: |
          set -euo pipefail
          VENDOR_SRC="${SRCROOT}/../vendor/ostler_fda"
          if [ ! -d "${VENDOR_SRC}" ]; then
              echo "error: vendor/ostler_fda/ is missing." >&2
              exit 1
          fi
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}/ostler_fda"
          cp -R "${VENDOR_SRC}/." "${DEST}/ostler_fda/"
          /usr/bin/xattr -cr "${DEST}/ostler_fda"
        inputFiles:
          - $(SRCROOT)/../vendor/ostler_fda
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ostler_fda
      - name: Bundle whatsapp_source conversation feed into Resources
        script: |
          set -euo pipefail
          # install.sh's WhatsApp conversation-memory feed (the gating
          # floor for conversation memory) probes
          # ${SCRIPT_DIR}/whatsapp_source/INSTALL_SNIPPET.sh to install
          # the four-artefact body feed LaunchAgent. Without this bundle
          # step the feed silently skips on a productised install.
          VENDOR_SRC="${SRCROOT}/../vendor/whatsapp_source"
          if [ ! -d "${VENDOR_SRC}" ]; then
              echo "error: vendor/whatsapp_source/ is missing." >&2
              exit 1
          fi
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}/whatsapp_source"
          cp -R "${VENDOR_SRC}/." "${DEST}/whatsapp_source/"
          /usr/bin/xattr -cr "${DEST}/whatsapp_source"
        inputFiles:
          - $(SRCROOT)/../vendor/whatsapp_source
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/whatsapp_source
      - name: Bundle Doctor agent into Resources
        script: |
          set -euo pipefail
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/doctor/agent"
          if [ -d "${SRC}" ]; then
            echo "Bundling Doctor agent from ${SRC} into Resources/doctor/agent/"
            mkdir -p "${DEST}/doctor/agent"
            cp -R "${SRC}/" "${DEST}/doctor/agent/"
            /usr/bin/xattr -cr "${DEST}/doctor" || true
          else
            echo "ERROR: vendor/doctor/agent not found at ${SRC}" >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/doctor/agent
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/doctor/agent
      - name: Bundle hub_power scripts into Resources
        script: |
          set -euo pipefail
          # install.sh's Phase 3.14 (Hub power policy) probes
          # ${SCRIPT_DIR}/hub-power/INSTALL_SNIPPET.sh to decide
          # whether to install the hub-power LaunchAgent (battery
          # / AC / sleep / wake throttling for MacBook hubs).
          # When that probe fails the install logs an info line
          # ("hub-power scripts not bundled with installer") and
          # silently continues. That is fine on a Mac Mini /
          # Studio (always-on AC, watcher is a no-op anyway), but
          # on a MacBook hub it means the LaunchAgent never lands
          # and the customer's battery drains on the first trip
          # away from the wall.
          #
          # For the .app code path, SCRIPT_DIR is Contents/Resources
          # at install time, so the package must land at
          # Contents/Resources/hub-power/. Note that the on-disk
          # subdir name is "hub-power" (matching what install.sh
          # looks for) even though the vendor subdir is "hub_power"
          # (matching the directory naming convention for vendor/).
          #
          # Source of truth: HR015 - Gaming PC/hub-power/. See
          # vendor/hub_power/README.md for the sync convention.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/hub_power"
          if [ -d "${SRC}" ]; then
            echo "Bundling hub_power from ${SRC} into Resources/hub-power/"
            mkdir -p "${DEST}/hub-power"
            # Copy WITHOUT -p so xattrs do not propagate -- codesign
            # rejects "resource fork, Finder information, or similar
            # detritus" on the staged bundle.
            cp -R "${SRC}/" "${DEST}/hub-power/"
            # Belt-and-braces xattr strip on the destination.
            /usr/bin/xattr -cr "${DEST}/hub-power" || true
            # Re-assert executable bits on the shell scripts. The
            # cp above should preserve them, but a `git checkout`
            # on a case-insensitive filesystem can occasionally
            # land without the x-bit.
            chmod 755 "${DEST}/hub-power/INSTALL_SNIPPET.sh"
            chmod 755 "${DEST}/hub-power/bin/"*.sh
          else
            echo "ERROR: vendor/hub_power not found at ${SRC}" >&2
            echo "       Run 'make vendor-sync' or sync manually from HR015 -- see vendor/hub_power/README.md." >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/hub_power
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/hub-power
      - name: Bundle cm024_knowledge Python package into Resources
        script: |
          set -euo pipefail
          # Vendor the CM024 Knowledge service (ostler-knowledge CLI)
          # into the signed .app so install.sh Phase 3.13b can pip-
          # install it into the customer venv without a network clone.
          # Pre-2026-05-21 the Knowledge service path was clone-only
          # (PWG_KNOWLEDGE_REPO env override); without an override the
          # install logged "Knowledge service not installed" and the
          # Doctor "Import Evernote" surface would later show "service
          # unavailable" when the feature flag is flipped on.
          #
          # Customer-facing primarily for Evernote import (Doctor UI,
          # feature-flagged OFF at v1.0; flipped on for v1.1). The CLI
          # install path is NOT flag-gated -- the binary is always
          # installed; the flag only controls UI visibility.
          #
          # Mirror of the ostler_security + ostler_fda vendor patterns
          # (PRs #115 + #116).
          #
          # Hard-fail if the vendor dir is missing so a forgotten
          # vendor-sync surfaces at build time, not at install time.
          VENDOR_SRC="${SRCROOT}/../vendor/cm024_knowledge"
          if [ ! -d "${VENDOR_SRC}" ]; then
              echo "error: vendor/cm024_knowledge/ is missing." >&2
              echo "error: see vendor/README.md for the manual sync recipe." >&2
              echo "error: the customer-install path pip-installs ostler-knowledge" >&2
              echo "error: from Contents/Resources/cm024_knowledge/. Refusing to build" >&2
              echo "error: a .app that would silently skip the Knowledge service install." >&2
              exit 1
          fi
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}/cm024_knowledge"
          # Copy WITHOUT -p so we do not preserve source xattrs
          # (com.apple.provenance / com.apple.macl on Sonoma+ break
          # codesign). The trailing /. on the source copies the dir
          # contents (not the dir itself) into ${DEST}/cm024_knowledge/.
          cp -R "${VENDOR_SRC}/." "${DEST}/cm024_knowledge/"
          # Strip any __pycache__ that snuck in from a developer
          # checkout. pip-install does not need them and they bloat
          # the codesigned bundle.
          find "${DEST}/cm024_knowledge" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "${DEST}/cm024_knowledge" -type f -name "*.pyc" -delete 2>/dev/null || true
          # Belt-and-braces xattr strip on the package (the bundle-
          # wide xattr -cr in the next phase repeats this, but doing
          # it here keeps the per-phase output clean).
          /usr/bin/xattr -cr "${DEST}/cm024_knowledge"
        inputFiles:
          - $(SRCROOT)/../vendor/cm024_knowledge/pyproject.toml
          - $(SRCROOT)/../vendor/cm024_knowledge/requirements.txt
          - $(SRCROOT)/../vendor/cm024_knowledge/src/cli.py
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/cm024_knowledge/pyproject.toml
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/cm024_knowledge/src/cli.py
      - name: Bundle CM048 conversation pipeline into Resources
        script: |
          set -euo pipefail
          # install.sh phase 3.10b probes ${SCRIPT_DIR}/cm048_pipeline/
          # to discover the vendored Python package, then sets up a
          # dedicated venv under ${OSTLER_DIR}/services/cm048/ and
          # symlinks the pwg-convo CLI into /usr/local/bin/.
          #
          # For the .app code path, SCRIPT_DIR is Contents/Resources
          # at install time, so the package must land at
          # Contents/Resources/cm048_pipeline/. Without this bundling
          # the install.sh probe fails and the conversation pipeline
          # is unavailable on the customer Mac (or the install
          # hard-fails when --allow-plaintext is not set).
          #
          # Companion to PR #115 (ostler_security): same vendoring
          # discipline, different upstream (CM048 source-of-truth
          # lives at ../CM048\ -\ PWG\ Conversation\ Processing/).
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/cm048_pipeline"
          if [ -d "${SRC}" ]; then
            echo "Bundling cm048_pipeline from ${SRC} into Resources/"
            mkdir -p "${DEST}/cm048_pipeline"
            # Copy WITHOUT -p so xattrs do not propagate -- codesign
            # rejects "resource fork, Finder information, or similar
            # detritus" on the staged bundle.
            cp -R "${SRC}/" "${DEST}/cm048_pipeline/"
            # Belt-and-braces xattr strip on the destination.
            /usr/bin/xattr -cr "${DEST}/cm048_pipeline" || true
          else
            echo "ERROR: vendor/cm048_pipeline not found at ${SRC}" >&2
            echo "       Sync manually from CM048 -- see vendor/README.md." >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/cm048_pipeline
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/cm048_pipeline
      - name: Bundle CM041 PWG People Graph (contact_syncer + meeting_syncer + identity_resolver + assistant_api) into Resources
        script: |
          set -euo pipefail
          # The CM041 PWG People Graph repo ships four productised assets:
          #   - contact_syncer/      Python package, runs the GDPR import
          #                          pipeline + the install-time iCloud
          #                          contacts hydration (CX-81 B1).
          #                          install.sh phases look for it at
          #                          "${SCRIPT_DIR}/contact_syncer" and
          #                          invoke .venv/bin/python -m
          #                          contact_syncer.import_all (GDPR) or
          #                          contact_syncer.syncer --vcf (B1).
          #   - meeting_syncer/      Python package, runs install-time
          #                          calendar backfill (CX-81 B1). Added
          #                          alongside contact_syncer on
          #                          2026-05-26 so the customer's Hub
          #                          launches with a populated Timeline.
          #                          Invoked as .venv/bin/python -m
          #                          meeting_syncer.syncer --days 90.
          #   - identity_resolver/   Shared Python helper imported by
          #                          BOTH syncers (sys.path hack inside
          #                          syncer.py expects it as a sibling
          #                          package at runtime). Vendored on
          #                          2026-05-26 to unblock B1; the
          #                          existing customer install never hit
          #                          the import path (contact_syncer.
          #                          import_all doesn't touch it), so
          #                          this surfaces a latent
          #                          ImportError as well as wiring B1.
          #   - assistant_api/       ical-server.py (the local API on
          #                          :8089) + its companion docs.
          #                          Installed by a later install.sh
          #                          phase that wires it as a launchd
          #                          agent.
          #
          # CRITICAL bundle layout: every subdir MUST live at the
          # Resources root (NOT under a vendor/cm041/ wrapper) because
          # install.sh's path checks hard-code the unwrapped paths.
          # Don't introduce a vendor/cm041/ subdir at install-time;
          # copy the CONTENTS of vendor/cm041/ directly. The
          # identity_resolver sibling layout is what
          # contact_syncer.syncer + meeting_syncer.syncer expect at
          # runtime via their `_PARENT_DIR` sys.path hack.
          #
          # `cp -R` without -p so source xattrs (com.apple.provenance,
          # com.apple.macl on Sonoma+) don't propagate into the .app
          # bundle. The subsequent "Strip xattrs" phase is a belt-and-
          # braces second pass over the whole bundle.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          VENDOR_ROOT="${SRCROOT}/../vendor/cm041"
          for sub in contact_syncer meeting_syncer identity_resolver assistant_api; do
            if [ ! -d "${VENDOR_ROOT}/${sub}" ]; then
              echo "error: vendor/cm041/${sub}/ missing." >&2
              echo "       Expected: ${VENDOR_ROOT}/${sub}" >&2
              echo "       Re-sync from the CM041 PWG People Graph repo." >&2
              exit 1
            fi
          done
          # Remove any stale prior copy. Build phases run incrementally
          # so without this step a vendor-syncer rename or delete would
          # leave the old tree in place.
          rm -rf "${DEST}/contact_syncer" "${DEST}/meeting_syncer" "${DEST}/identity_resolver" "${DEST}/assistant_api"
          cp -R "${VENDOR_ROOT}/contact_syncer"    "${DEST}/contact_syncer"
          cp -R "${VENDOR_ROOT}/meeting_syncer"    "${DEST}/meeting_syncer"
          cp -R "${VENDOR_ROOT}/identity_resolver" "${DEST}/identity_resolver"
          cp -R "${VENDOR_ROOT}/assistant_api"     "${DEST}/assistant_api"
          /usr/bin/xattr -cr "${DEST}/contact_syncer" "${DEST}/meeting_syncer" "${DEST}/identity_resolver" "${DEST}/assistant_api"
          # ical-server.py is executable on the operator instance via
          # `python ical-server.py`, not chmod +x, so we don't toggle
          # the mode here. requirements.txt + .env.example land 644.
      - name: Bundle email-ingest LaunchAgent + scripts into Resources
        script: |
          set -euo pipefail
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/email_ingest"
          if [ -d "${SRC}" ]; then
            echo "Bundling email_ingest from ${SRC} into Resources/email-ingest/"
            mkdir -p "${DEST}/email-ingest"
            # install.sh:5088 looks for ${SCRIPT_DIR}/email-ingest/INSTALL_SNIPPET.sh
            # so the bundled directory MUST be named email-ingest (hyphen),
            # matching the source directory name in HR015.
            cp -R "${SRC}/"* "${DEST}/email-ingest/"
            /usr/bin/xattr -cr "${DEST}/email-ingest" || true
            chmod 755 "${DEST}/email-ingest/INSTALL_SNIPPET.sh"
            chmod 755 "${DEST}/email-ingest/bin/"*.sh "${DEST}/email-ingest/bin/"*.py "${DEST}/email-ingest/bin/ostler-rescan-mail" 2>/dev/null || true
          else
            echo "ERROR: vendor/email_ingest not found at ${SRC}" >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/email_ingest
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/email-ingest
      - name: Bundle CM021 PWG Email Intelligence (pwg-email-ingest CLI) into Resources
        script: |
          set -euo pipefail
          # CX-83: CM021 is the canonical email-ingest substrate. It
          # ships the pwg-email-ingest console script that the
          # vendor/email_ingest/bin/email-ingest-tick.sh LaunchAgent
          # has been calling on every hourly tick since shipping.
          # Until this lift the CLI was a phantom -- tick.sh ran
          # `command -v pwg-email-ingest`, found nothing, exited 127
          # on every tick. The hourly mail ingestion has never run
          # on a customer install.
          #
          # CRITICAL bundle layout: cm021 (NOT vendor/cm021) at the
          # Resources root. install.sh resolves the source via
          # `${SCRIPT_DIR}/cm021/pyproject.toml`, matching the
          # ostler_fda + cm048_pipeline conventions.
          #
          # Naming-collision note: CM021 (email-intelligence repo) is
          # the email-ingest substrate. CM046 (PWG-Email-Intelligence
          # repo) is research-only (signature mining, header mining,
          # relationship scoring) and stays out of the v1.0 customer
          # build. Every future agent will hit this confusion -- the
          # CM021 / CM046 split is intentional.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          VENDOR_ROOT="${SRCROOT}/../vendor/cm021"
          if [ ! -d "${VENDOR_ROOT}" ]; then
            echo "error: vendor/cm021/ missing." >&2
            echo "       Expected: ${VENDOR_ROOT}" >&2
            echo "       Re-sync from the CM021 email-intelligence repo." >&2
            exit 1
          fi
          if [ ! -f "${VENDOR_ROOT}/pyproject.toml" ]; then
            echo "error: vendor/cm021/pyproject.toml missing." >&2
            echo "       The CLI install pip-installs from this path; without" >&2
            echo "       the manifest the install.sh hydrate_email step degrades" >&2
            echo "       to MSG_HYDRATE_EMAIL_SKIPPED_FDA_PENDING." >&2
            exit 1
          fi
          # Remove any stale prior copy. Build phases run incrementally
          # so without this step a vendor-tree rename or delete would
          # leave the old tree in place.
          rm -rf "${DEST}/cm021"
          mkdir -p "${DEST}/cm021"
          cp -R "${VENDOR_ROOT}/pyproject.toml" "${DEST}/cm021/pyproject.toml"
          cp -R "${VENDOR_ROOT}/src"            "${DEST}/cm021/src"
          /usr/bin/xattr -cr "${DEST}/cm021"
        inputFiles:
          - $(SRCROOT)/../vendor/cm021
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/cm021
      - name: Bundle imessage-bridge LaunchAgent + producer into Resources
        script: |
          set -euo pipefail
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/imessage_bridge"
          if [ -d "${SRC}" ]; then
            echo "Bundling imessage_bridge from ${SRC} into Resources/imessage-bridge/"
            mkdir -p "${DEST}/imessage-bridge"
            # install.sh 3.14c looks for ${SCRIPT_DIR}/imessage-bridge/INSTALL_SNIPPET.sh
            # so the bundled directory MUST be named imessage-bridge (hyphen),
            # matching the source directory name in HR015.
            cp -R "${SRC}/"* "${DEST}/imessage-bridge/"
            /usr/bin/xattr -cr "${DEST}/imessage-bridge" || true
            chmod 755 "${DEST}/imessage-bridge/INSTALL_SNIPPET.sh"
            chmod 755 "${DEST}/imessage-bridge/bin/bridge.py" 2>/dev/null || true
          else
            echo "ERROR: vendor/imessage_bridge not found at ${SRC}" >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../vendor/imessage_bridge
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/imessage-bridge
      - name: Bundle assistant-agent LaunchAgent snippet + plists into Resources
        script: |
          set -euo pipefail
          # CX-58 (DMG #33, 2026-05-24): MISSING from every prior DMG cut.
          # install.sh §3.14e (line 6731) looks for
          # "${SCRIPT_DIR}/assistant-agent/INSTALL_SNIPPET.sh" and copies it
          # to ${OSTLER_DIR}/assistant-agent/ before sourcing it to install
          # the com.creativemachines.ostler.assistant LaunchAgent (the
          # gateway daemon that Ostler.app polls at localhost:8000 + that
          # the installer's success screen pulls a pairing QR envelope from).
          # The package was never wired through the bundle phase, so the
          # snippet never made it into Resources/, so install.sh's
          # `if [[ ... -f INSTALL_SNIPPET.sh ]]` test silently failed AND
          # the LaunchAgent never got loaded AND every customer would have
          # ended up with a dead gateway + Ostler.app stuck at "Hub
          # starting up...". Caught in Studio retest #28 2026-05-24.
          #
          # The directory lives at the repo top (NOT under vendor/), so
          # the SRC path differs from the other vendor bundles. Layout
          # at SRC: INSTALL_SNIPPET.sh + launchd/ + tests/.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../assistant-agent"
          if [ -d "${SRC}" ]; then
            echo "Bundling assistant-agent from ${SRC} into Resources/assistant-agent/"
            rm -rf "${DEST}/assistant-agent"
            mkdir -p "${DEST}/assistant-agent"
            cp -R "${SRC}/"* "${DEST}/assistant-agent/"
            /usr/bin/xattr -cr "${DEST}/assistant-agent" || true
            chmod 755 "${DEST}/assistant-agent/INSTALL_SNIPPET.sh"
          else
            echo "ERROR: assistant-agent not found at ${SRC}" >&2
            echo "       The gateway LaunchAgent install snippet lives there." >&2
            echo "       Without it, install.sh silently skips the assistant" >&2
            echo "       LaunchAgent + the customer ends up with a dead Hub." >&2
            exit 1
          fi
        inputFiles:
          - $(SRCROOT)/../assistant-agent
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/assistant-agent
      - name: Bundle wiki-recompile (daily wiki rebuild LaunchAgent)
        script: |
          set -euo pipefail
          # install.sh:5838 probes ${SCRIPT_DIR}/wiki-recompile/INSTALL_SNIPPET.sh
          # to install the wiki-recompile LaunchAgent (rebuilds the
          # customer's MkDocs wiki on a daily tick so newly-ingested
          # data lands in the wiki view). Without this bundle, the
          # GUI install falls through to either a reuse-existing
          # branch (only true on a re-install) or an info-log + skip
          # branch. The customer's wiki then freezes at the first
          # compile output.
          #
          # Source-of-truth: CM051 repo root /wiki-recompile/.
          # See CM051_INSTALLER_DEEP_DIVE_FINDINGS_2026-05-22.md F2.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../wiki-recompile"
          if [ ! -d "${SRC}" ] || [ ! -f "${SRC}/INSTALL_SNIPPET.sh" ]; then
            echo "ERROR: wiki-recompile/ not found at ${SRC} (need INSTALL_SNIPPET.sh)" >&2
            echo "       CM051 repo root must contain wiki-recompile/INSTALL_SNIPPET.sh." >&2
            exit 1
          fi
          echo "Bundling wiki-recompile from ${SRC} into Resources/wiki-recompile/"
          mkdir -p "${DEST}/wiki-recompile"
          cp -R "${SRC}/"* "${DEST}/wiki-recompile/"
          /usr/bin/xattr -cr "${DEST}/wiki-recompile" || true
          chmod 755 "${DEST}/wiki-recompile/INSTALL_SNIPPET.sh"
        inputFiles:
          - $(SRCROOT)/../wiki-recompile/INSTALL_SNIPPET.sh
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/wiki-recompile/INSTALL_SNIPPET.sh
      - name: Bundle legal Python package (consent-string constants)
        script: |
          set -euo pipefail
          # install.sh:1913 probes ${SCRIPT_DIR}/legal/pyproject.toml
          # to pip-install the legal package into the customer venv.
          # The package contains the consent-string constants that
          # ostler_security.consent and the Rust gates import at
          # runtime when the customer triggers an Article 9 sensitive-
          # data flow, the WhatsApp channel arm, or voice transcription.
          # Without this bundle, the GUI install silently skips the
          # pip install (no warn, no error - the [[ -d ]] gate is
          # false), and the customer hits ModuleNotFoundError at the
          # first consent gate, hours after install.
          #
          # Source-of-truth: HR015 repo /legal/, vendored into CM051
          # at vendor/legal/. See CM051_INSTALLER_DEEP_DIVE_FINDINGS_2026-05-22.md F3.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../vendor/legal"
          if [ ! -d "${SRC}" ] || [ ! -f "${SRC}/pyproject.toml" ]; then
            echo "ERROR: vendor/legal not found at ${SRC} (need pyproject.toml)" >&2
            echo "       Re-sync from HR015 /legal/ (see vendor/README.md)." >&2
            exit 1
          fi
          echo "Bundling legal from ${SRC} into Resources/legal/"
          mkdir -p "${DEST}/legal"
          cp -R "${SRC}/"* "${DEST}/legal/"
          # Strip __pycache__ that may have leaked from a developer
          # checkout - pip-install does not need them and they bloat
          # the codesigned bundle.
          find "${DEST}/legal" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "${DEST}/legal" -type f -name "*.pyc" -delete 2>/dev/null || true
          /usr/bin/xattr -cr "${DEST}/legal" || true
        inputFiles:
          - $(SRCROOT)/../vendor/legal/pyproject.toml
          - $(SRCROOT)/../vendor/legal/consent_strings.py
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/legal/pyproject.toml
      - name: Bundle LICENSES + THIRD_PARTY_NOTICES.md into Resources
        script: |
          set -euo pipefail
          # install.sh:6502 + 6533 probe ${SCRIPT_DIR}/THIRD_PARTY_NOTICES.md
          # and ${SCRIPT_DIR}/LICENSES/ to install canonical OSS
          # attribution files into ~/.ostler/. Without the bundle,
          # the customer's wiki licences page is empty and the
          # `install.sh --licenses` flag has nothing to print.
          # Compliance-paperwork concern but not install-blocking.
          #
          # Source-of-truth: HR015 repo /LICENSES/ + /THIRD_PARTY_NOTICES.md,
          # vendored into CM051 at vendor/LICENSES/ + vendor/THIRD_PARTY_NOTICES.md.
          # See CM051_INSTALLER_DEEP_DIVE_FINDINGS_2026-05-22.md F7 + F8.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          NOTICES_SRC="${SRCROOT}/../vendor/THIRD_PARTY_NOTICES.md"
          LICENSES_SRC="${SRCROOT}/../vendor/LICENSES"
          if [ ! -f "${NOTICES_SRC}" ]; then
            echo "ERROR: vendor/THIRD_PARTY_NOTICES.md not found at ${NOTICES_SRC}" >&2
            echo "       Re-sync from HR015 /THIRD_PARTY_NOTICES.md (see vendor/README.md)." >&2
            exit 1
          fi
          if [ ! -d "${LICENSES_SRC}" ]; then
            echo "ERROR: vendor/LICENSES not found at ${LICENSES_SRC}" >&2
            echo "       Re-sync from HR015 /LICENSES/ (see vendor/README.md)." >&2
            exit 1
          fi
          echo "Bundling THIRD_PARTY_NOTICES.md + LICENSES/ into Resources/"
          cp "${NOTICES_SRC}" "${DEST}/THIRD_PARTY_NOTICES.md"
          mkdir -p "${DEST}/LICENSES"
          cp -R "${LICENSES_SRC}/"* "${DEST}/LICENSES/"
          /usr/bin/xattr -cr "${DEST}/LICENSES" "${DEST}/THIRD_PARTY_NOTICES.md" || true
          chmod 644 "${DEST}/THIRD_PARTY_NOTICES.md"
        inputFiles:
          - $(SRCROOT)/../vendor/THIRD_PARTY_NOTICES.md
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/THIRD_PARTY_NOTICES.md
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/LICENSES
      - name: Bundle scripts/deferred-register-device.sh into Resources/scripts
        script: |
          set -euo pipefail
          # install.sh:4963 probes ${SCRIPT_DIR}/scripts/deferred-register-device.sh
          # to install the LaunchAgent that retries device registration
          # against appcast.ostler.ai when the install-time POST fails
          # (Wi-Fi blip, Worker briefly down). Without this bundle,
          # the LaunchAgent loads but exits immediately on missing-file.
          # Belt-and-braces fallback; primary registration is during
          # install via the GUI's task #340 path.
          #
          # Source-of-truth: CM051 repo /scripts/deferred-register-device.sh.
          # See CM051_INSTALLER_DEEP_DIVE_FINDINGS_2026-05-22.md F9.
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/../scripts/deferred-register-device.sh"
          if [ ! -f "${SRC}" ]; then
            echo "ERROR: scripts/deferred-register-device.sh not found at ${SRC}" >&2
            exit 1
          fi
          echo "Bundling scripts/deferred-register-device.sh into Resources/scripts/"
          mkdir -p "${DEST}/scripts"
          cp "${SRC}" "${DEST}/scripts/deferred-register-device.sh"
          chmod 755 "${DEST}/scripts/deferred-register-device.sh"
          /usr/bin/xattr -cr "${DEST}/scripts" || true
        inputFiles:
          - $(SRCROOT)/../scripts/deferred-register-device.sh
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/scripts/deferred-register-device.sh
      - name: Strip xattrs from .app bundle (pre-CodeSign hygiene)
        script: |
          set -euo pipefail
          # Belt-and-braces: even if a previous build phase or a `cp -p`
          # somewhere else left FinderInfo / provenance / macl xattrs on
          # the staged bundle, strip them recursively before the final
          # CodeSign step runs. codesign rejects bundles with any xattrs
          # ("resource fork, Finder information, or similar detritus not
          # allowed") and this is the canonical fix.
          APP_BUNDLE="${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          if [ -d "${APP_BUNDLE}" ]; then
            /usr/bin/xattr -cr "${APP_BUNDLE}"
          fi
        # No inputFiles/outputFiles -- this must always run.

  # Unit test target. Hosts SelfRelocatorTests.swift, LicenseVerifierTests.swift,
  # LicensePersistenceTests.swift (and any future XCTest suites under
  # OstlerInstallerTests/). Loaded as a bundle injected into the main
  # app, the conventional macOS unit-test arrangement so @testable
  # import sees the app's internal types.
  OstlerInstallerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OstlerInstallerTests
    dependencies:
      - target: OstlerInstaller
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.ostler.installer.tests
        PRODUCT_NAME: OstlerInstallerTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OstlerInstaller.app/Contents/MacOS/OstlerInstaller"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  OstlerInstaller:
    build:
      targets:
        OstlerInstaller: all
        OstlerInstallerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OstlerInstallerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
