			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -euo pipefail\n# The CM041 PWG People Graph repo ships two productised assets:\n#   - contact_syncer/  Python package, runs the GDPR import\n#                      pipeline. install.sh §3.10 looks for it\n#                      at \"${SCRIPT_DIR}/contact_syncer\" (i.e.\n#                      Contents/Resources/contact_syncer/ when\n#                      install.sh runs from inside the .app),\n#                      copies it to ${OSTLER_DIR}/import-pipeline/,\n#                      and invokes\n#                      .venv/bin/python -m contact_syncer.import_all.\n#   - assistant_api/   ical-server.py (the local API on :8089)\n#                      + its companion docs. Installed by a\n#                      later install.sh phase that wires it\n#                      as a launchd agent.\n#\n# CRITICAL bundle layout: both subdirs MUST live at the\n# Resources root (NOT under a vendor/cm041/ wrapper) because\n# install.sh's path checks (lines 4196 onward + 4245) hard-code\n# the unwrapped paths. Don't introduce a vendor/cm041/ subdir\n# at install-time; copy the CONTENTS of vendor/cm041/ directly.\n#\n# `cp -R` without -p so source xattrs (com.apple.provenance,\n# com.apple.macl on Sonoma+) don't propagate into the .app\n# bundle. The subsequent \"Strip xattrs\" phase is a belt-and-\n# braces second pass over the whole bundle.\nDEST=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\nVENDOR_ROOT=\"${SRCROOT}/../vendor/cm041\"\nif [ ! -d \"${VENDOR_ROOT}/contact_syncer\" ] || [ ! -d \"${VENDOR_ROOT}/assistant_api\" ]; then\n  echo \"error: vendor/cm041/ missing contact_syncer/ or assistant_api/.\" >&2\n  echo \"       Expected: ${VENDOR_ROOT}/contact_syncer + ${VENDOR_ROOT}/assistant_api\" >&2\n  echo \"       Re-sync from the CM041 PWG People Graph repo.\" >&2\n  exit 1\nfi\n# Remove any stale prior copy. Build phases run incrementally\n# so without this step a vendor-syncer rename or delete would\n# leave the old tree in place.\nrm -rf \"${DEST}/contact_syncer\" \"${DEST}/assistant_api\"\ncp -R \"${VENDOR_ROOT}/contact_syncer\" \"${DEST}/contact_syncer\"\ncp -R \"${VENDOR_ROOT}/assistant_api\"  \"${DEST}/assistant_api\"\n/usr/bin/xattr -cr \"${DEST}/contact_syncer\" \"${DEST}/assistant_api\"\n# ical-server.py is executable on the operator instance via\n# `python ical-server.py`, not chmod +x, so we don't toggle\n# the mode here. requirements.txt + .env.example land 644.\n";
		};
