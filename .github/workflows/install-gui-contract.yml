name: install-gui-contract

# Cross-component contract test for the install.sh <-> Swift GUI
# protocol.  Six v0.1->v0.4 PRs (#79, #81, #82, #83, #84, #87) each
# closed a missed handler between the bash emitter and the Swift
# decoder.  This workflow turns the pattern into a CI gate: any new
# protocol drift (unknown PROMPT kind, STEP_BEGIN id without a
# canonicalOrder entry, emission kind without a decoder arm) fails
# the build before a customer-shipping DMG inherits it.
#
# Companion files:
#   scripts/extract_install_protocol.py
#   gui/scripts/extract_gui_renderers.py
#   tests/test_install_gui_contract.py
#   tests/test_install_gui_contract_negatives.py

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'install.sh.strings.en-GB.sh'
      - 'lib/progress_emitter.sh'
      - 'lib/write_pipeline_signals.py'
      - 'gui/OstlerInstaller/**'
      - 'gui/project.yml'
      - 'scripts/extract_install_protocol.py'
      - 'scripts/check_install_sh_script_dir_coverage.py'
      - 'gui/scripts/extract_gui_renderers.py'
      - 'tests/test_install_gui_contract.py'
      - 'tests/test_install_gui_contract_negatives.py'
      - 'tests/test_installer_app_bundle_contents.sh'
      - 'vendor/legal/**'
      - 'vendor/LICENSES/**'
      - 'vendor/THIRD_PARTY_NOTICES.md'
      - '.github/workflows/install-gui-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate emissions manifest
        run: |
          set -euo pipefail
          python3 scripts/extract_install_protocol.py --out /tmp/emissions.json
          python3 -c "import json, sys; m=json.load(open('/tmp/emissions.json')); print(f'Emissions: {len(m[\"emissions\"])}')"

      - name: Validate handlers manifest
        run: |
          set -euo pipefail
          python3 gui/scripts/extract_gui_renderers.py --out /tmp/handlers.json
          python3 -c "import json, sys; m=json.load(open('/tmp/handlers.json')); print(f'Handlers: {len(m[\"handlers\"])}, prompt_kinds: {m[\"prompt_kinds\"]}')"

      - name: Run contract test (positive path)
        run: |
          set -euo pipefail
          python3 -m unittest tests.test_install_gui_contract -v

      - name: Run contract test (negative-path self-tests)
        run: |
          set -euo pipefail
          python3 -m unittest tests.test_install_gui_contract_negatives -v

      - name: Check ${SCRIPT_DIR}/X coverage (durable bundling contract gate)
        # The deep-dive audit (CM051_INSTALLER_DEEP_DIVE_FINDINGS_2026-05-22.md)
        # found 10+ install.sh probes against ${SCRIPT_DIR}/X that had no
        # matching postBuildScript in gui/project.yml. This gate prevents
        # the next buried-failure gap from reaching a customer retest by
        # asserting every probe is covered.
        run: |
          set -euo pipefail
          python3 scripts/check_install_sh_script_dir_coverage.py --mode ci

      - name: Run app-bundle byte-by-byte regression
        # Per locked memory feedback_silent_bail_regression_test_shape.
        # Each per-finding assertion pins the EXACT failure shape the
        # 2026-05-22 audit flagged so a regression is caught at CI rather
        # than at the customer's first install.
        run: |
          set -euo pipefail
          bash tests/test_installer_app_bundle_contents.sh
