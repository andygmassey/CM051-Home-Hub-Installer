name: assistant-name-check

# Hardcoded-assistant-name lint guard. Blocks customer-rendered surfaces
# from shipping the literal word "Marvin" -- the customer chooses their
# assistant's name at install time (default "Marvin"; Alison chose
# "Samantha"; v1.2 multi-instance will multiply this).
#
# Locked 2026-05-19 after the THIRD scrub attempt for the same class
# of leak. Same script + bypass mechanism as the pre-commit hook at
# .githooks/check-assistant-name-hardcoded.sh. Bypass per line:
# append `assistant-name-exempt`.
#
# Two modes:
#   * PR / push to main: diff-only scan vs the base SHA -- mirrors the
#     pre-commit hook scope so the local + CI experience matches.
#   * Audit (push to main, scheduled, manual): full-tree sweep that
#     catches regressions that slipped past a per-commit diff scan.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assistant-name-diff:
    name: assistant-name (diff scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with merge-base history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve BASE_SHA
        id: base
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -n "${PR_BASE_SHA:-}" ]; then
              echo "sha=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
              echo "Comparing against PR base: $PR_BASE_SHA"
          else
              BASE="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
              echo "sha=$BASE" >> "$GITHUB_OUTPUT"
              echo "Comparing against previous commit: $BASE"
          fi

      - name: Run assistant-name diff check
        run: |
          set -euo pipefail
          SCRIPT=".githooks/check-assistant-name-hardcoded.sh"
          if [ ! -x "$SCRIPT" ]; then
              echo "::error::$SCRIPT missing or not executable. Re-run .githooks/install.sh."
              exit 1
          fi
          "$SCRIPT" ci "${{ steps.base.outputs.sha }}"

  assistant-name-audit:
    name: assistant-name (full audit, push to main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run full-tree audit
        run: |
          set -euo pipefail
          SCRIPT=".githooks/check-assistant-name-hardcoded.sh"
          if [ ! -x "$SCRIPT" ]; then
              echo "::error::$SCRIPT missing or not executable."
              exit 1
          fi
          "$SCRIPT" audit
